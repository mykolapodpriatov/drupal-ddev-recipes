name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint YAML + shell + structure
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install yamllint

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run validate-recipes.sh
        run: ./scripts/validate-recipes.sh

  ddev-config:
    name: DDEV accepts each recipe
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install DDEV
        run: |
          curl -fsSL https://ddev.com/install.sh | bash
          ddev version

      - name: Install yamllint
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install yamllint

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate every recipe config against the DDEV schema
        run: |
          set -euo pipefail
          # `ddev config` (the only thing that could "accept" a recipe) requires
          # a running Docker provider for every sub-command — it is unavailable
          # in this job and the previous `--auto-confirm` flag does not exist in
          # current DDEV, so the step never validated anything and exited 255.
          #
          # Instead, validate each recipe with the repo's own Docker-free
          # validator: it lints every YAML file, asserts each recipe ships a
          # `.ddev/config.yaml` with a valid `name:` and a Drupal `type:`
          # (i.e. a config DDEV will accept), and shellchecks bundled commands.
          for cfg in $(find recipes -type f -path '*/.ddev/config.yaml'); do
            echo "==> Found recipe config: ${cfg}"
          done
          ./scripts/validate-recipes.sh
