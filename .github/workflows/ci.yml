name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint YAML + shell + structure
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install yamllint

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run validate-recipes.sh
        run: ./scripts/validate-recipes.sh

  readme-coverage:
    name: Every recipe is documented in the README
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Assert each recipes/* dir is listed in the root README table
        run: |
          set -euo pipefail
          # The old `ddev-config` job here just re-ran validate-recipes.sh (which
          # the `lint` job already runs) because `ddev config` needs a Docker
          # provider that isn't available in CI. Replace it with a check that
          # actually adds value: every recipe directory must appear in the
          # root README recipe table, so a new recipe can't ship undocumented.
          missing=0
          for recipe_dir in recipes/*/; do
            name="$(basename "$recipe_dir")"
            if ! grep -q "recipes/${name}/" README.md; then
              echo "::error::recipe '${name}' is not linked in README.md"
              missing=1
            else
              echo "==> ${name} is documented"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add the missing recipe(s) to the README recipe table."
            exit 1
          fi
