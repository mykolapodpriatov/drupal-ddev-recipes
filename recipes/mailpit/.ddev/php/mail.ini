; Route PHP's mail() through mhsendmail to Mailpit.
;
; mhsendmail is shipped with the DDEV web container since v1.22 and speaks
; SMTP to mailpit:1025. Without this override, mail() falls back to the
; system sendmail (which is absent in the container), so any module that
; still uses Drupal's legacy MailManager + PhpMail interface silently drops
; messages on the floor.

sendmail_path = "/usr/local/bin/mhsendmail --smtp-addr=mailpit:1025 --from=noreply@example.com"

; Make sure SMTP transport in PHP itself is sane (rarely used but cheap).
SMTP = mailpit
smtp_port = 1025
