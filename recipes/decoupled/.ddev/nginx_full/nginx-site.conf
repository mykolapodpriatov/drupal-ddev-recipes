# Single-hostname reverse-proxy variant.
#
# To use this mode, remove "api" and "next" from additional_hostnames in
# config.yaml. Everything then lives at https://<project>.ddev.site:
#
#   /jsonapi/*, /api/*, /sites/*, /user/*, /admin/*, /node/*  -> Drupal (PHP-FPM)
#   anything else                                              -> Next.js
#
# Default DDEV nginx-site.conf for Drupal serves the docroot. This variant
# adds an upstream + location-based routing on top.

upstream nextjs_upstream {
    server nextjs:3000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen 443 ssl default_server;

    root /var/www/html/web;
    index index.php index.html index.htm;

    ssl_certificate     /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;

    # ---- Drupal-owned paths ----
    location ~ ^/(jsonapi|api|admin|user|node|taxonomy/term|search|filter|comment|batch|update\.php|core/install\.php|sites/default/files|next/preview) {
        try_files $uri /index.php?$query_string;
    }

    # All other /* requests go to Next.js.
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # PHP execution for the Drupal locations above.
    location ~ '\.php$|^/update.php' {
        fastcgi_split_path_info ^(.+?\.php)(|/.*)$;
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_intercept_errors on;
        fastcgi_pass 127.0.0.1:9000;
    }

    # Hide internal files.
    location ~ (^|/)\. { return 403; }
}
